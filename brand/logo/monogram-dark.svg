<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="The AI Agent Agent monogram">
  <title>AA monogram</title>
  <rect width="128" height="128" fill="#0C0C0C"/>
  <!-- Outer frame: talent-agency plaque energy -->
  <rect x="8" y="8" width="112" height="112" fill="none" stroke="#C4A574" stroke-width="1.5"/>
  <rect x="14" y="14" width="100" height="100" fill="none" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Dual A: recursive agent/agent -->
  <g fill="none" stroke="#F4F1EA" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Left A -->
    <path d="M28 96 L48 32 L68 96"/>
    <path d="M36 72 H60"/>
    <!-- Right A, slightly offset: second agent -->
    <path d="M60 96 L80 32 L100 96" stroke="#C4A574"/>
    <path d="M68 72 H92" stroke="#C4A574"/>
  </g>
</svg>
