<!DOCTYPE html><html><head><meta charset="utf-8"><title>Logo preview</title>
<style>
body{font-family:Helvetica,Arial,sans-serif;margin:40px;background:#fff;color:#000}
.row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:24px 0}
.card{border:1px solid #e6e6e6;padding:28px}
.dark{background:#000}
img,object,svg{max-width:100%;height:auto;display:block}
h1{font-size:18px;letter-spacing:.08em;text-transform:uppercase}
p{color:#666}
</style></head><body>
<h1>The AI Agent Agent · Logo</h1>
<p>Vectorized from Noah handwriting. Not a photo paste.</p>
<div class="row">
  <div class="card"><p>Black wordmark</p><img src="vector/wordmark-black.svg" alt="black"></div>
  <div class="card dark"><p style="color:#aaa">White wordmark</p><img src="vector/wordmark-white.svg" alt="white"></div>
</div>
<div class="card"><p>Green wordmark</p><img src="vector/wordmark-green.svg" alt="green"></div>
</body></html>
