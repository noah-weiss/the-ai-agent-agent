<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Logo</title>
<style>
body{margin:0;font-family:Helvetica Neue,Helvetica,Arial,sans-serif;background:#fff}
header{padding:18px 32px;border-bottom:1px solid #e5e5e5;letter-spacing:.14em;text-transform:uppercase;font-size:11px;font-weight:700}
.wrap{max-width:960px;margin:0 auto;padding:40px 24px}
.card{border:1px solid #e5e5e5;padding:40px;margin:0 0 20px}
.dark{background:#000}
p{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#666;margin:0 0 20px}
.dark p{color:#999}
img{max-width:100%;max-height:160px;display:block}
</style></head><body>
<header>The AI Agent Agent · Logo</header>
<div class="wrap">
  <div class="card"><p>Signature wordmark</p><img src="vector/wordmark-black.svg"></div>
  <div class="card dark"><p>Reverse</p><img src="vector/wordmark-white.svg"></div>
  <div class="card"><p>Agency lockup</p><img src="vector/lockup-agency.svg" style="max-height:240px"></div>
</div>
</body></html>
