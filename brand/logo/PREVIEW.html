<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logo · The AI Agent Agent</title>
  <style>
    body { margin:0; font-family: Helvetica Neue, Helvetica, Arial, sans-serif; background:#fff; color:#000; }
    header { border-bottom:1px solid #e6e6e6; padding:20px 40px; letter-spacing:.12em; text-transform:uppercase; font-size:12px; font-weight:600; }
    .wrap { max-width:1000px; margin:0 auto; padding:40px 24px 80px; }
    h1 { font-size:28px; font-weight:500; letter-spacing:-.02em; margin:0 0 8px; }
    .sub { color:#666; margin-bottom:36px; }
    .card { border:1px solid #e6e6e6; padding:48px; margin:0 0 24px; }
    .card.dark { background:#000; }
    .card p { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#666; margin:0 0 24px; }
    .card.dark p { color:#999; }
    img { display:block; max-width:100%; height:auto; max-height:180px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
    @media(max-width:800px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>The AI Agent Agent · Professional logo system</header>
  <div class="wrap">
    <h1>Vector logo from handwriting</h1>
    <p class="sub">Traced and cleaned for professional use. Not a photo paste.</p>
    <div class="card">
      <p>Primary · black on white</p>
      <img src="vector/wordmark-black.svg" alt="Black wordmark" />
    </div>
    <div class="grid">
      <div class="card dark">
        <p>Reverse · white on black</p>
        <img src="vector/wordmark-white.svg" alt="White wordmark" />
      </div>
      <div class="card">
        <p>Accent · green</p>
        <img src="vector/wordmark-green.svg" alt="Green wordmark" />
      </div>
    </div>
    <div class="card">
      <p>Lockup</p>
      <img src="vector/lockup-professional.svg" alt="Lockup" style="max-height:240px;" />
    </div>
  </div>
</body>
</html>
