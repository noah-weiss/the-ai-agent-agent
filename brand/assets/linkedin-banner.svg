<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="LinkedIn banner">
  <title>LinkedIn banner</title>
  <rect width="1584" height="396" fill="#0C0C0C"/>
  <line x1="0" y1="396" x2="1584" y2="396" stroke="#2A2A2A" stroke-width="2"/>
  <!-- thin gold rule -->
  <line x1="96" y1="300" x2="280" y2="300" stroke="#C4A574" stroke-width="2"/>
