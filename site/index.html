<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The AI Agent Agent</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b6b3a;
      color: #fff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: auto;
      min-height: 140px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 28px 40px 0;
      font-size: 18px;
      letter-spacing: 0.02em;
      z-index: 10;
    }
    .topbar .name {
      display: flex;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .topbar .logo-img {
      height: 140px;
      width: auto;
      max-width: min(560px, 60vw);
      display: block;
    }
    .topbar .sub {
      font-size: 13px;
      opacity: 0.65;
      margin-top: 3px;
    }
    .nav {
      position: fixed;
      left: 40px;
      top: 180px;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 68px;
      line-height: 1.0;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .nav div {
      margin-bottom: 4px;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .nav div:hover {
      opacity: 0.7;
    }
    .who {
      position: fixed;
      right: 40px;
      bottom: 48px;
      max-width: 480px;
      font-size: 18px;
      line-height: 1.55;
      opacity: 0.95;
    }
    .who strong {
      font-weight: 600;
      display: block;
      margin-bottom: 10px;
      font-size: 22px;
    }
    .who a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <a class="logo-link name" href="#" onclick="showInfo('who'); return false;" aria-label="The AI Agent Agent">
      <img class="logo-img" src="assets/logo-header.png" alt="The AI Agent Agent — simplifying AI" />
    </a>
  </div>

  <!-- Big stacked nav -->
  <div class="nav">
    <div onclick="showInfo('services')">Services</div>
    <div onclick="showInfo('clients')">Clients</div>
    <div onclick="showInfo('contact')">Contact</div>
  </div>

  <!-- Bottom right info -->
  <div class="who" id="info"></div>

<script>
function showInfo(section) {
  const info = document.getElementById('info');

  if (section === 'services') {
    info.innerHTML = `
      <strong>Services</strong>
      <strong style="margin-top:12px;display:block;">1:1 Session</strong>
      AI Zero to AI Hero in one session.<br>
      In one session, I will have you up and running like a pro.<br>
      Quickly get in the know with Noah.<br>
      My clients have spanned beauty, insurance, law, and finance (and gradmas).<br><br>
      <strong style="margin-top:8px;display:block;">Concierge</strong>
      My services are bespoke and consultative.<br>
      The relationship doesn't stop after our session.<br>
      Newsletter access. Meetups. Exclusive events.
    `;
  } else if (section === 'clients') {
    info.innerHTML = `
      <strong>Clients</strong>
      Ideal for solopreneurs, startups, and professionals (lawyers, CPAs, operators, founders).<br><br>
      People who want an AI edge and someone accountable for it.
    `;
  } else if (section === 'contact') {
    info.innerHTML = `
      <strong>Contact</strong>
      Ready? <a href="https://www.linkedin.com/in/noaheweiss" target="_blank">Message on LinkedIn</a><br><br>
      <a href="mailto:noah@theaiagentagent.com">noah@theaiagentagent.com</a>
    `;
  } else if (section === 'who') {
    info.innerHTML = `
      <strong>Who</strong>
      Noah Weiss is The AI Agent Agent.<br><br>
      I become your agent for all things AI.<br>
      Your AI Concierge.
    `;
  }
}

// Default: Services with full subtext
showInfo('services');

// Name click → Who
document.querySelector('.name').addEventListener('click', () => showInfo('who'));
</script>

</body>
</html>
