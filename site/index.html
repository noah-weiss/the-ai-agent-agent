<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Noah Weiss is The AI Agent Agent. Personal AI Concierge. Go from AI Zero to AI Hero in one session.">
  <link rel="canonical" href="https://theaiagentagent.com/">
  <meta property="og:title" content="The AI Agent Agent">
  <meta property="og:description" content="I become your agent for all things AI. Your AI Concierge.">
  <meta property="og:url" content="https://theaiagentagent.com/">
  <meta property="og:type" content="website">
  <title>The AI Agent Agent</title>
  <style>
    :root {
      --green: #0b6b3a;
      --green-deep: #094d2c;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --pad: clamp(1.1rem, 4.2vw, 2.5rem);
      --max: 1120px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      background: var(--green);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }

    .shell {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding-left: max(var(--pad), env(safe-area-inset-left));
      padding-right: max(var(--pad), env(safe-area-inset-right));
    }

    /* Header */
    .site-header {
      padding-top: max(1rem, env(safe-area-inset-top));
      padding-bottom: 0.75rem;
    }

    .logo-link {
      display: inline-block;
      max-width: 100%;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .logo-link img {
      display: block;
      width: min(17rem, 82vw);
      height: auto;
      max-height: 5.5rem;
      object-fit: contain;
      object-position: left center;
    }

    /* Layout */
    .layout {
      display: grid;
      gap: 1.75rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
      min-height: calc(100dvh - 7.5rem);
    }

    /* Nav */
    .nav {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .nav button {
      appearance: none;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: clamp(2rem, 9vw, 2.75rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-align: left;
      padding: 0.55rem 0;
      min-height: 3rem;
      cursor: pointer;
      transition: color 0.15s var(--ease);
      -webkit-tap-highlight-color: transparent;
    }

    .nav button:active { color: #fff; }
    .nav button.active {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 0.16em;
      text-decoration-thickness: 1.5px;
    }

    /* Panel */
    .panel {
      background: rgba(0, 0, 0, 0.14);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 1.15rem 1.1rem 1.25rem;
      width: 100%;
      max-width: 36rem;
    }

    .panel h1 {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.85rem;
    }

    .panel h2 {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.25;
      margin: 1rem 0 0.45rem;
    }

    .panel h2:first-of-type { margin-top: 0.15rem; }

    .panel p {
      font-size: 1.02rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.92);
      margin: 0 0 0.65rem;
    }

    .panel p:last-child { margin-bottom: 0; }

    .panel a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      overflow-wrap: anywhere;
    }

    /* Testimonials */
    .quotes {
      display: flex;
      flex-direction: column;
      gap: 1.15rem;
    }

    .quote q {
      display: block;
      quotes: "“" "”";
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 1.08rem;
      line-height: 1.45;
      font-style: italic;
      margin-bottom: 0.45rem;
    }

    .quote q::before { content: open-quote; }
    .quote q::after { content: close-quote; }

    .quote .by {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-style: normal;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .panel .hint {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* Footer */
    .site-footer {
      margin-top: 1.5rem;
      padding-bottom: 0.25rem;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Desktop */
    @media (min-width: 900px) {
      body {
        overflow: hidden;
        height: 100vh;
      }

      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: 1.75rem 0 0;
        pointer-events: none;
      }

      .site-header .shell { pointer-events: none; }
      .logo-link { pointer-events: auto; }

      .logo-link img {
        width: auto;
        height: 8.5rem;
        max-height: none;
        max-width: min(34rem, 52vw);
      }

      .layout {
        min-height: 100vh;
        min-height: 100dvh;
        display: block;
        position: relative;
        padding: 0;
      }

      .nav {
        position: fixed;
        left: max(2.5rem, env(safe-area-inset-left));
        top: 16.5rem;
        gap: 0;
        z-index: 10;
      }

      .nav button {
        font-size: 4.1rem;
        line-height: 1;
        padding: 0.12rem 0;
        min-height: 0;
        width: auto;
      }

      .panel {
        position: fixed;
        right: max(2.5rem, env(safe-area-inset-right));
        bottom: 4.25rem;
        width: min(28rem, 38vw);
        max-width: none;
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
      }

      .panel h1 {
        font-size: 0.8rem;
        margin-bottom: 1rem;
      }

      .panel h2 { font-size: 1.35rem; }
      .panel p { font-size: 1.08rem; }
      .quote q { font-size: 1.15rem; }

      .site-footer {
        position: fixed;
        left: max(2.5rem, env(safe-area-inset-left));
        bottom: 1.25rem;
        margin: 0;
        z-index: 10;
      }
    }

    @media (min-width: 900px) and (max-height: 760px) {
      .logo-link img { height: 6.5rem; }
      .nav { top: 13rem; }
      .nav button { font-size: 3.2rem; }
      .panel { bottom: 3.5rem; }
    }

    @media (max-width: 380px) {
      .nav button { font-size: 1.85rem; }
      .panel { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="shell">
      <a class="logo-link" href="#who" id="logoBtn" aria-label="The AI Agent Agent — Who">
        <img
          src="assets/logo-header.png?v=2"
          alt="The AI Agent Agent — simplifying AI"
          width="649"
          height="411"
          decoding="async"
        />
      </a>
    </div>
  </header>

  <main class="shell layout">
    <nav class="nav" id="nav" aria-label="Primary">
      <button type="button" data-section="services">Services</button>
      <button type="button" data-section="clients">Clients</button>
      <button type="button" data-section="testimonials">Testimonials</button>
      <button type="button" data-section="contact">Contact</button>
    </nav>

    <section class="panel" id="panel" aria-live="polite">
      <h1>Who</h1>
      <p>Noah Weiss is The AI Agent Agent.</p>
      <p>I become your agent for all things AI.</p>
      <p>Your AI Concierge.</p>
    </section>

    <footer class="site-footer">© 2026 The AI Agent Agent</footer>
  </main>

<script>
(function () {
  var panel = document.getElementById('panel');
  var nav = document.getElementById('nav');

  var content = {
    who: {
      label: 'Who',
      html:
        '<h1>Who</h1>' +
        '<p>Noah Weiss is The AI Agent Agent.</p>' +
        '<p>I become your agent for all things AI.</p>' +
        '<p>Your AI Concierge.</p>'
    },
    services: {
      label: 'Services',
      html:
        '<h1>Services</h1>' +
        '<h2>1:1 Session</h2>' +
        '<p>AI Zero to AI Hero in one session.</p>' +
        '<p>In one session, I will have you up and running like a pro.</p>' +
        '<p>My clients have spanned beauty, insurance, law, and finance (and grandmas).</p>' +
        '<h2>Concierge</h2>' +
        '<p>My services are bespoke and consultative.</p>' +
        '<p>The relationship doesn\'t stop after our session.</p>' +
        '<p>Newsletter access. Meetups. Exclusive events.</p>'
    },
    clients: {
      label: 'Clients',
      html:
        '<h1>Clients</h1>' +
        '<p>Ideal for solopreneurs, startups, and professionals (lawyers, CPAs, operators, founders).</p>' +
        '<p>People who want an AI edge and someone accountable for it.</p>'
    },
    testimonials: {
      label: 'Testimonials',
      html:
        '<h1>Testimonials</h1>' +
        '<div class="quotes">' +
          '<div class="quote">' +
            '<q>Noah got me from zero to actually using agents in one sitting. No fluff.</q>' +
            '<div class="by">Founder · beauty</div>' +
          '</div>' +
          '<div class="quote">' +
            '<q>He stays in your corner after the session. That\'s the part most people skip.</q>' +
            '<div class="by">Operator · insurance</div>' +
          '</div>' +
          '<div class="quote">' +
            '<q>Clear, fast, human. Finally someone who doesn\'t speak AI at me.</q>' +
            '<div class="by">Attorney</div>' +
          '</div>' +
        '</div>' +
        '<p class="hint">Role-only credits. Swap in your real quotes anytime.</p>'
    },
    contact: {
      label: 'Contact',
      html:
        '<h1>Contact</h1>' +
        '<p>Ready? <a href="https://www.linkedin.com/in/noaheweiss" target="_blank" rel="noopener">Message on LinkedIn</a></p>' +
        '<p><a href="mailto:noah@theaiagentagent.com">noah@theaiagentagent.com</a></p>'
    }
  };

  function show(section) {
    var data = content[section] || content.who;
    panel.innerHTML = data.html;

    nav.querySelectorAll('button').forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-section') === section);
    });

    if (window.matchMedia('(max-width: 899px)').matches && section !== 'who') {
      setTimeout(function () {
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 40);
    }
  }

  nav.querySelectorAll('button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      show(btn.getAttribute('data-section'));
    });
  });

  document.getElementById('logoBtn').addEventListener('click', function (e) {
    e.preventDefault();
    show('who');
    if (window.matchMedia('(max-width: 899px)').matches) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  show('who');
})();
</script>
</body>
</html>
