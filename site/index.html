<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The AI Agent Agent</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b6b3a;
      color: #fff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      font-size: 13px;
      letter-spacing: 0.02em;
      z-index: 10;
    }
    .topbar .name {
      font-weight: 600;
    }
    .topbar .sub {
      font-size: 10px;
      opacity: 0.65;
      margin-top: 1px;
    }
    .topbar .close {
      font-size: 12px;
      letter-spacing: 0.1em;
      opacity: 0.85;
      cursor: pointer;
    }
    .nav {
      position: fixed;
      left: 40px;
      top: 120px;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 68px;
      line-height: 1.0;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .nav div {
      margin-bottom: 4px;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .nav div:hover {
      opacity: 0.7;
    }
    .who {
      position: fixed;
      right: 40px;
      bottom: 48px;
      max-width: 420px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.92;
    }
    .who strong {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
    .who a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <div class="name">The AI Agent Agent</div>
      <div class="sub">LOS ANGELES</div>
    </div>
    <div class="close" onclick="location.reload()">CLOSE</div>
  </div>

  <!-- Big stacked nav - clickable -->
  <div class="nav">
    <div onclick="showInfo('agent')">Agent</div>
    <div onclick="showInfo('practice')">Practice</div>
    <div onclick="showInfo('clients')">Clients</div>
    <div onclick="showInfo('contact')">Contact</div>
  </div>

  <!-- Bottom right info area - starts with who text -->
  <div class="who" id="info">
    <strong>Who is The AI Agent Agent?</strong>
    Noah Weiss. Your agent for all things AI. AI Concierge. Human touch. Full-service representation.
  </div>

<script>
function showInfo(section) {
  const info = document.getElementById('info');
  
  if (section === 'agent') {
    info.innerHTML = `
      <strong>Agent</strong>
      Noah Weiss. Your agent for all things AI. AI Concierge. Human touch. Full-service representation.
    `;
  } else if (section === 'practice') {
    info.innerHTML = `
      <strong>Practice</strong>
      1:1 Session — Zero to Hero.<br>
      Concierge — Ongoing AI support. One message away.
    `;
  } else if (section === 'clients') {
    info.innerHTML = `
      <strong>Clients</strong>
      Solopreneurs, startups, and professionals (lawyers, CPAs, operators, founders).
    `;
  } else if (section === 'contact') {
    info.innerHTML = `
      <strong>Contact</strong>
      Ready? <a href="https://www.linkedin.com/in/noaheweiss" target="_blank">Message on LinkedIn</a>
    `;
  }
}

// Optional: clicking the name resets to default
document.querySelector('.name').addEventListener('click', () => {
  document.getElementById('info').innerHTML = `
    <strong>Who is The AI Agent Agent?</strong>
    Noah Weiss. Your agent for all things AI. AI Concierge. Human touch. Full-service representation.
  `;
});
</script>

</body>
</html>
