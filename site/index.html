<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The AI Agent Agent</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b6b3a;
      color: #fff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      font-size: 13px;
      letter-spacing: 0.02em;
      z-index: 10;
    }
    .topbar .name {
      font-weight: 600;
    }
    .topbar .sub {
      font-size: 10px;
      opacity: 0.65;
      margin-top: 1px;
    }
    .topbar .close {
      font-size: 12px;
      letter-spacing: 0.1em;
      opacity: 0.85;
    }
    .nav {
      position: fixed;
      left: 40px;
      top: 120px;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 68px;
      line-height: 1.0;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .nav div {
      margin-bottom: 4px;
    }
    .who {
      position: fixed;
      right: 40px;
      bottom: 48px;
      max-width: 420px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.92;
    }
    .who strong {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <div class="name">The AI Agent Agent</div>
      <div class="sub">LOS ANGELES</div>
    </div>
    <div class="close">CLOSE</div>
  </div>

  <!-- Big stacked nav -->
  <div class="nav">
    <div>Agent</div>
    <div>Practice</div>
    <div>Clients</div>
    <div>Contact</div>
  </div>

  <!-- Bottom right who text -->
  <div class="who">
    <strong>Who is The AI Agent Agent?</strong>
    Noah Weiss. Your agent for all things AI. AI Concierge. Human touch. Full-service representation.
  </div>

</body>
</html>
