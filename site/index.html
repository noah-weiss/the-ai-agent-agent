<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>The AI Agent Agent</title>
  <style>
    :root {
      --green: #0b6b3a;
      --pad: clamp(20px, 4vw, 40px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: var(--green);
      color: #fff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        max(20px, env(safe-area-inset-top))
        max(var(--pad), env(safe-area-inset-right))
        max(28px, env(safe-area-inset-bottom))
        max(var(--pad), env(safe-area-inset-left));
    }

    .topbar {
      flex: 0 0 auto;
      margin-bottom: clamp(28px, 5vw, 48px);
    }

    .topbar .name {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar .logo-img {
      height: clamp(72px, 18vw, 140px);
      width: auto;
      max-width: min(560px, 88vw);
      display: block;
    }

    .main {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(28px, 5vw, 48px);
      align-items: start;
    }

    .nav {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: clamp(36px, 10vw, 68px);
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .nav div {
      margin-bottom: 0.08em;
      cursor: pointer;
      transition: opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .nav div:hover,
    .nav div:active {
      opacity: 0.7;
    }

    .nav div.active {
      opacity: 1;
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }

    .who {
      max-width: 480px;
      font-size: clamp(15px, 3.8vw, 18px);
      line-height: 1.55;
      opacity: 0.95;
      padding-bottom: 8px;
    }

    .who strong {
      font-weight: 600;
      display: block;
      margin-bottom: 10px;
      font-size: clamp(17px, 4.2vw, 22px);
    }

    .who a {
      color: #fff;
      text-decoration: underline;
      word-break: break-word;
    }

    /* Desktop: big left nav, info lower-right */
    @media (min-width: 820px) {
      body {
        overflow: hidden;
        height: 100vh;
      }

      .page {
        height: 100vh;
        height: 100dvh;
        padding: 28px 40px 48px;
        position: relative;
      }

      .topbar {
        margin-bottom: 0;
      }

      .topbar .logo-img {
        height: 140px;
        max-width: min(560px, 55vw);
      }

      .main {
        display: block;
      }

      .nav {
        position: absolute;
        left: 40px;
        top: 260px;
        font-size: 68px;
        line-height: 1.0;
      }

      .who {
        position: absolute;
        right: 40px;
        bottom: 48px;
        font-size: 18px;
      }

      .who strong {
        font-size: 22px;
      }
    }

    /* Small phones: slightly tighter */
    @media (max-width: 380px) {
      .nav {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="logo-link name" href="#" onclick="showInfo('who'); return false;" aria-label="The AI Agent Agent">
        <img class="logo-img" src="assets/logo-header.png" alt="The AI Agent Agent — simplifying AI" />
      </a>
    </div>

    <div class="main">
      <div class="nav" id="nav">
        <div data-section="services" onclick="showInfo('services')">Services</div>
        <div data-section="clients" onclick="showInfo('clients')">Clients</div>
        <div data-section="contact" onclick="showInfo('contact')">Contact</div>
      </div>

      <div class="who" id="info"></div>
    </div>
  </div>

<script>
function showInfo(section) {
  const info = document.getElementById('info');

  document.querySelectorAll('.nav div').forEach(function (el) {
    el.classList.toggle('active', el.getAttribute('data-section') === section);
  });

  if (section === 'services') {
    info.innerHTML = `
      <strong>Services</strong>
      <strong style="margin-top:12px;display:block;">1:1 Session</strong>
      AI Zero to AI Hero in one session.<br>
      In one session, I will have you up and running like a pro.<br>
      My clients have spanned beauty, insurance, law, and finance (and gradmas).<br><br>
      <strong style="margin-top:8px;display:block;">Concierge</strong>
      My services are bespoke and consultative.<br>
      The relationship doesn't stop after our session.<br>
      Newsletter access. Meetups. Exclusive events.
    `;
  } else if (section === 'clients') {
    info.innerHTML = `
      <strong>Clients</strong>
      Ideal for solopreneurs, startups, and professionals (lawyers, CPAs, operators, founders).<br><br>
      People who want an AI edge and someone accountable for it.
    `;
  } else if (section === 'contact') {
    info.innerHTML = `
      <strong>Contact</strong>
      Ready? <a href="https://www.linkedin.com/in/noaheweiss" target="_blank" rel="noopener">Message on LinkedIn</a><br><br>
      <a href="mailto:noah@theaiagentagent.com">noah@theaiagentagent.com</a>
    `;
  } else if (section === 'who') {
    info.innerHTML = `
      <strong>Who</strong>
      Noah Weiss is The AI Agent Agent.<br><br>
      I become your agent for all things AI.<br>
      Your AI Concierge.
    `;
    document.querySelectorAll('.nav div').forEach(function (el) {
      el.classList.remove('active');
    });
  }
}

showInfo('services');

document.querySelector('.name').addEventListener('click', function (e) {
  e.preventDefault();
  showInfo('who');
});
</script>

</body>
</html>
